<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Product Manager
    </div>
    <span class="api-badge">mockapi.io / product</span>
  </header>

  <div class="container">

    <!-- ── ESTADÍSTICAS ──────────────────────────────── -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total productos</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Precio promedio</div>
        <div class="stat-value" id="stat-avg">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Stock total</div>
        <div class="stat-value" id="stat-stock">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Stock bajo (≤5)</div>
        <div class="stat-value" id="stat-low" style="color:var(--danger)">—</div>
      </div>
    </div>

    <div class="main-grid">

      <!-- ── FORMULARIO ────────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title" id="form-title">Nuevo producto</span>
          <span class="mode-badge create" id="mode-badge">Crear</span>
        </div>
        <div class="panel-body">

          <div class="form-group">
            <label for="f-name">Nombre</label>
            <input type="text" id="f-name" placeholder="Ej: Camiseta Premium" />
          </div>

          <div class="form-group">
            <label for="f-desc">Descripción</label>
            <textarea id="f-desc" placeholder="Descripción del producto..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label for="f-precio">Precio</label>
              <input type="number" id="f-precio" placeholder="0.00" step="0.01" min="0" />
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label for="f-stock">Stock</label>
              <input type="number" id="f-stock" placeholder="0" step="1" min="0" />
            </div>
          </div>

          <div style="margin-top:1.1rem;">
            <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit()">
              ✦ Crear producto
            </button>
            <button class="btn btn-ghost" id="cancel-btn" onclick="cancelEdit()" style="display:none;">
              Cancelar edición
            </button>
          </div>

        </div>
      </div>

      <!-- ── LISTA DE PRODUCTOS ─────────────────────── -->
      <div class="panel">
        <div class="list-header">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              type="text"
              id="search-input"
              placeholder="Buscar por nombre o descripción..."
              oninput="filterProducts()"
            />
          </div>
          <button class="refresh-btn" onclick="loadProducts()" title="Recargar">↻</button>
        </div>
        <div class="product-list" id="product-list">
          <div class="empty-state">
            <div class="empty-icon">◌</div>
            <p>Cargando productos...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── TOASTS ──────────────────────────────────────── -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="app.js"></script>
</body>
</html>
